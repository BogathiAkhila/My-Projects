<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scientific Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
        }

        .calculator {
            width: 400px;
            padding: 25px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        #display {
            width: 100%;
            height: 80px;
            border: none;
            outline: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 30px;
            text-align: right;
            background: #111827;
            color: #00ffcc;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .number {
            background: #1f2937;
            color: white;
        }

        .operator {
            background: #ff9800;
            color: white;
        }

        .scientific {
            background: #7c3aed;
            color: white;
        }

        .equal {
            background: #00c853;
            color: white;
        }

        .clear {
            background: #ff1744;
            color: white;
        }

        .zero {
            grid-column: span 2;
        }

        @media(max-width:450px) {
            .calculator {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <div class="calculator">

        <h2 class="title">
            <i class="fa-solid fa-calculator"></i>
            Scientific Calculator
        </h2>

        <input type="text" id="display" readonly>

        <div class="buttons">

            <!-- First Row -->
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="scientific" onclick="backspace()">⌫</button>
            <button class="scientific" onclick="appendValue('(')">(</button>
            <button class="scientific" onclick="appendValue(')')">)</button>

            <!-- Second Row -->
            <button class="scientific" onclick="appendValue('Math.sqrt(')">√</button>
            <button class="scientific" onclick="appendValue('Math.pow(')">xʸ</button>
            <button class="scientific" onclick="appendValue('Math.PI')">π</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <!-- Third Row -->
            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <!-- Fourth Row -->
            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <!-- Fifth Row -->
            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Sixth Row -->
            <button class="scientific" onclick="appendValue('Math.sin(')">sin</button>
            <button class="number zero" onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>

            <!-- Seventh Row -->
            <button class="scientific" onclick="appendValue('Math.cos(')">cos</button>
            <button class="scientific" onclick="appendValue('Math.tan(')">tan</button>
            <button class="scientific" onclick="appendValue('Math.log10(')">log</button>
            <button class="scientific" onclick="appendValue('.')">.</button>

        </div>

    </div>

    <script>

        const display = document.getElementById("display");

        // Add values to display
        function appendValue(value) {
            display.value += value;
        }

        // Clear full display
        function clearDisplay() {
            display.value = "";
        }

        // Remove one digit at a time
        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        // Calculate result
        function calculate() {
            try {
                display.value = eval(display.value);
            }
            catch (error) {
                display.value = "Error";
            }
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Weather Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth transitions for high quality photography backgrounds */
        #bgBody {
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s ease-in-out, background-color 1s ease;
        }

        /* Interactive pulse and hover animations */
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(6, 182, 212, 0.8); }
        }
        .animate-intro-btn {
            animation: pulse-glow 2.5s infinite ease-in-out;
        }
        
        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-animal {
            animation: bounce-gentle 3s ease-in-out infinite;
        }
    </style>
</head>
<body id="bgBody" class="bg-slate-950 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="introContainer" class="text-center transition-all duration-500">
        <button 
            id="startBtn" 
            class="animate-intro-btn bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-xl font-bold px-10 py-6 rounded-2xl shadow-xl hover:brightness-110 active:scale-95 transition-all cursor-pointer tracking-wide"
        >
            ✨ Click Me to Know Weather ✨
        </button>
    </div>

    <div id="mainInterface" class="hidden opacity-0 bg-slate-900/60 backdrop-blur-xl p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/10 text-white text-center transition-all duration-700">
        <h1 class="text-3xl font-extrabold mb-6 tracking-wide drop-shadow-md text-cyan-400">Weather Buddy</h1>
        
        <div class="flex flex-col gap-3 sm:flex-row sm:gap-2 mb-8">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                class="flex-1 px-5 py-3.5 rounded-2xl bg-black/40 border border-white/10 placeholder-white/40 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400 text-lg transition-all"
            >
            <button 
                id="searchBtn" 
                class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-6 py-3.5 rounded-2xl transition duration-300 transform active:scale-95 text-lg shadow-lg shadow-cyan-500/20 cursor-pointer"
            >
                Search
            </button>
        </div>

        <p id="message" class="text-sm text-cyan-200 font-medium hidden mb-4"></p>

        <div id="weatherCard" class="hidden space-y-6">
            <div>
                <h2 id="cityName" class="text-3xl font-bold tracking-tight">---</h2>
                <p id="description" class="text-sm uppercase tracking-widest text-cyan-300 mt-1 font-semibold">---</p>
            </div>

            <div id="animalContainer" class="w-36 h-36 mx-auto rounded-full bg-black/30 border border-white/20 flex items-center justify-center text-6xl shadow-inner animate-animal transition-all duration-500">
                🐾
            </div>

            <div class="flex justify-center items-baseline">
                <span id="temperature" class="text-7xl font-black tracking-tighter drop-shadow-md">0</span>
                <span class="text-3xl font-light ml-1">°C</span>
            </div>

            <div class="bg-black/40 rounded-2xl p-4 border border-white/10 backdrop-blur-md">
                <p class="text-xs uppercase font-bold text-cyan-300 tracking-wider mb-1">Buddy's Suggestion</p>
                <p id="suggestionText" class="text-sm font-medium leading-relaxed">---</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
